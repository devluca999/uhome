# Supabase local development config
# https://supabase.com/docs/guides/cli/local-development
# Run: npx supabase start | npx supabase db reset | npx supabase status
# Ports moved to 55xxx range to avoid Windows Hyper-V port exclusion conflicts

project_id = "haume"

[api]
enabled = true
port = 55321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 55322
shadow_port = 55320
health_timeout = "2m"
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = []

[realtime]
enabled = true

[studio]
enabled = true
port = 55323

[inbucket]
enabled = true
port = 55326

[analytics]
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:1000"
additional_redirect_urls = ["https://127.0.0.1:1000", "http://localhost:1000", "http://127.0.0.1:3000", "http://localhost:3000"]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[storage]
enabled = true
