name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  # Verify this merge came from develop (safety check)
  verify-branch-source:
    name: Verify Branch Source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history to check merge source
      
      - name: Check if merge came from develop
        run: |
          # Get the merge commit message
          MERGE_MSG=$(git log -1 --pretty=%B)
          # Check if this is a merge from develop
          if [[ "$MERGE_MSG" == *"Merge branch 'develop'"* ]] || [[ "$MERGE_MSG" == *"Merge pull request"* ]]; then
            echo "✅ Merge appears to be from develop branch or PR"
          else
            echo "⚠️  Warning: This may not be a merge from develop. Please verify."
            # Don't fail, but warn - branch protection should handle this
          fi

  production-smoke-tests:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: verify-branch-source
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      
      - name: Verify staging secrets are configured
        run: |
          if [ -z "$VITE_SUPABASE_URL" ]; then
            echo "::error::VITE_SUPABASE_STAGING_URL secret is not configured. Pre-deploy E2E tests require staging Supabase credentials."
            exit 1
          fi
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_STAGING_URL }}

      - name: Run pre-deploy E2E tests against staging
        run: npm run test:e2e:headless
        env:
          SUPABASE_ENV: staging
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_STAGING_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_STAGING_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY_STAGING }}

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [verify-branch-source, production-smoke-tests]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      - name: Record deployment
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Production deployment recorded in Releases tab"
          # TODO: Call record-deployment Edge Function with commit hash, version, and environment='production'
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-production
          path: dist
          retention-days: 30  # Keep production artifacts longer
      
      - name: Deployment
        run: echo "Deployment steps would be added here based on hosting provider"
        # For Vercel: Use vercel-action
        # For Netlify: Use netlify-action
        # For Cloudflare Pages: Use cloudflare-pages-action
        # This workflow validates the build - actual deployment is typically handled by hosting platform's integration

