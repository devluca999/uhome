name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production

jobs:
  # Verify this merge came from develop (safety check)
  verify-branch-source:
    name: Verify Branch Source
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch full history to check merge source
      
      - name: Check if merge came from develop
        run: |
          # Get the merge commit message
          MERGE_MSG=$(git log -1 --pretty=%B)
          # Check if this is a merge from develop
          if [[ "$MERGE_MSG" == *"Merge branch 'develop'"* ]] || [[ "$MERGE_MSG" == *"Merge pull request"* ]]; then
            echo "✅ Merge appears to be from develop branch or PR"
          else
            echo "⚠️  Warning: This may not be a merge from develop. Please verify."
            # Don't fail, but warn - branch protection should handle this
          fi

  production-smoke-tests:
    name: Production Smoke Tests
    runs-on: ubuntu-latest
    needs: verify-branch-source
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local Supabase
        shell: bash
        run: |
          set -e
          for attempt in 1 2 3 4; do
            npx supabase stop --no-backup 2>/dev/null || true
            if npx supabase start; then
              exit 0
            fi
            echo "supabase start failed (attempt $attempt), retrying in 60s..."
            sleep 60
          done
          exit 1

      - name: Apply migrations and SQL seed
        run: npm run db:reset

      - name: Get local Supabase credentials
        run: npx tsx scripts/get-local-supabase-env.ts >> $GITHUB_ENV

      - name: Seed demo data
        run: npm run seed:demo

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests (chromium only, critical path)
        run: npm run test:smoke
        timeout-minutes: 10

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [verify-branch-source, production-smoke-tests]
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Verify production and staging Supabase URLs differ
        run: |
          prod='${{ secrets.VITE_SUPABASE_URL }}'
          staging='${{ secrets.VITE_SUPABASE_STAGING_URL }}'
          if [ -z "$prod" ] || [ -z "$staging" ]; then
            echo "::error::VITE_SUPABASE_URL and VITE_SUPABASE_STAGING_URL must both be set for production deploy guardrails."
            exit 1
          fi
          if [ "$prod" = "$staging" ]; then
            echo "::error::VITE_SUPABASE_URL must not equal VITE_SUPABASE_STAGING_URL (production would point at the staging database)."
            exit 1
          fi

      - name: Derive staging Supabase project ref for client guard
        id: supabase_guard
        run: |
          u='${{ secrets.VITE_SUPABASE_STAGING_URL }}'
          if [[ "$u" =~ https?://([a-zA-Z0-9]+)\.supabase\.co ]]; then
            echo "staging_ref=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
          else
            echo "::error::Could not parse staging project ref from VITE_SUPABASE_STAGING_URL (expected https://<ref>.supabase.co)."
            exit 1
          fi
      
      - name: Build project
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ENVIRONMENT: production
          VITE_SUPABASE_ENV: production
          VITE_HOSTING_ENV: production
          VITE_STAGING_SUPABASE_PROJECT_REF: ${{ steps.supabase_guard.outputs.staging_ref }}
      
      - name: Record deployment
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Production deployment recorded in Releases tab"
          # TODO: Call record-deployment Edge Function with commit hash, version, and environment='production'
        env:
          SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-production
          path: dist
          retention-days: 30  # Keep production artifacts longer
      
      - name: Deployment
        run: echo "Deployment steps would be added here based on hosting provider"
        # For Vercel: Use vercel-action
        # For Netlify: Use netlify-action
        # For Cloudflare Pages: Use cloudflare-pages-action
        # This workflow validates the build - actual deployment is typically handled by hosting platform's integration
